id: global-geopolitical-conflicts-test
title: 全球地缘冲突速报（测试版）

# 测试配置：每个新闻源只保留一个主入口 URL，删除同一站点下的子板块，
# 用于快速验证爬虫对各个新闻来源的抓取效果。

sources:
  # ============================================================
  # 1. 全球通讯社 / 综合国际新闻：负责兜底全球突发
  # ============================================================

  - name: Reuters 全球与区域
    type: web
    urls:
      - url: "https://www.reuters.com/world/"
        hint: "全球国际新闻总览，优先提取战争、冲突、外交危机、制裁、军事部署、边境紧张等内容"
    maxArticles: 15
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 3
    blockResources: true

  - name: AP 国际新闻
    type: web
    urls:
      - url: "https://apnews.com/world-news"
        hint: "AP 全球新闻总览"
    maxArticles: 15
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 3
    blockResources: true

  - name: Al Jazeera 全球与中东
    type: web
    urls:
      - url: "https://www.aljazeera.com/news/"
        hint: "全球新闻，重点提取战争、冲突、抗议、制裁、外交危机"
    maxArticles: 15
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 3
    blockResources: true

  - name: Al Jazeera RSS 备份
    type: rss
    url: "https://www.aljazeera.com/xml/rss/all.xml"
    fetchFullContent: true

  - name: Guardian 世界与地区
    type: web
    urls:
      - url: "https://www.theguardian.com/world"
        hint: "世界新闻总览，关注战争、冲突、外交危机、人道危机"
    maxArticles: 15
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 3
    blockResources: true

  - name: France24 国际
    type: web
    urls:
      - url: "https://www.france24.com/en/international/"
        hint: "国际新闻总览"
    maxArticles: 15
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 3
    blockResources: true

  - name: DW 国际新闻
    type: web
    urls:
      - url: "https://www.dw.com/en/top-stories/s-9097"
        hint: "德国之声国际新闻总览"
    maxArticles: 10
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 2
    blockResources: true

  # ============================================================
  # 2. 国际组织 / 冲突数据 / 人道危机：用于校验和补充背景
  # ============================================================

  - name: 联合国和平与安全
    type: web
    urls:
      - url: "https://dppa.dfs.un.org/en/peace-and-security-news"
        hint: "联合国和平与安全新闻，关注安理会、斡旋、停火、人道与维和"
    maxArticles: 10
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 2
    blockResources: true

  - name: ReliefWeb 全球人道危机
    type: web
    urls:
      - url: "https://reliefweb.int/updates"
        hint: "全球人道主义更新，重点关注战争、流离失所、饥荒、难民、援助受阻"
    maxArticles: 15
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 2
    blockResources: true

  - name: International Crisis Group 冲突预警
    type: web
    urls:
      - url: "https://www.crisisgroup.org/latest-updates"
        hint: "全球冲突最新更新与分析"
    maxArticles: 10
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 2
    blockResources: true

  - name: ACLED 冲突数据与分析
    type: web
    urls:
      - url: "https://acleddata.com/updates"
        hint: "ACLED 最新冲突更新，提取各地区暴力事件、冲突趋势、抗议、武装组织动态"
    maxArticles: 10
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 2
    blockResources: true

  - name: CFR 全球冲突追踪
    type: web
    url: "https://www.cfr.org/global-conflict-tracker"
    hint: "全球冲突地图和冲突风险概览，适合补充背景和判断冲突等级"
    maxArticles: 10
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 2
    blockResources: true

  # ============================================================
  # 3. 官方与安全组织：用于补充外交、军援、制裁、北约/欧盟立场
  # ============================================================

  - name: 欧洲安全与外交
    type: web
    urls:
      - url: "https://www.eeas.europa.eu/eeas/news_en"
        hint: "欧盟对外行动署，关注制裁、外交声明、冲突调停"
    maxArticles: 10
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 2
    blockResources: true

  - name: 美国外交与国防
    type: web
    urls:
      - url: "https://www.state.gov/press-releases/"
        hint: "美国国务院新闻，关注制裁、外交声明、冲突调停、地区安全"
    maxArticles: 10
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 2
    blockResources: true

  # ============================================================
  # 4. 重点地区补盲：避免只依赖欧美大媒体
  # ============================================================

  - name: 俄乌与俄罗斯视角
    type: web
    urls:
      - url: "https://kyivindependent.com/news/"
        hint: "乌克兰视角，俄乌战争、前线、军援、外交"
    maxArticles: 15
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 2
    blockResources: true

  - name: 中东地区媒体
    type: web
    urls:
      - url: "https://www.timesofisrael.com/"
        hint: "以色列视角，巴以、加沙、伊朗、黎巴嫩、以色列国内安全"
    maxArticles: 15
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 2
    blockResources: true

  - name: 亚太安全与中国周边
    type: web
    urls:
      - url: "https://www.scmp.com/news/china/diplomacy"
        hint: "中国外交、周边安全、中美、中欧、印太"
    maxArticles: 15
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 2
    blockResources: true

  - name: 南亚安全
    type: web
    urls:
      - url: "https://www.thehindu.com/news/international/"
        hint: "印度媒体国际新闻，关注印巴、克什米尔、印度洋、中国周边"
    maxArticles: 10
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 2
    blockResources: true

  - name: 非洲冲突与安全
    type: web
    urls:
      - url: "https://sudantribune.com/"
        hint: "苏丹战争、RSF、达尔富尔、南苏丹、非洲之角"
    maxArticles: 15
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 2
    blockResources: true

  - name: 美洲与加勒比安全
    type: web
    urls:
      - url: "https://insightcrime.org/news/"
        hint: "拉美有组织犯罪、海地安全、委内瑞拉、边境与武装组织"
    maxArticles: 10
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 2
    blockResources: true

  # ============================================================
  # 5. 中文信息源：补充中文语境和中国官方/主流报道
  # ============================================================

  - name: 中文国际新闻源
    type: web
    urls:
      - url: "https://www.news.cn/world/"
        hint: "新华社国际新闻，关注中国官方视角下的全球冲突、外交、制裁与安全议题"
    maxArticles: 10
    extractDepth: deep
    detailExtraction: auto
    detailConcurrency: 2
    blockResources: true

