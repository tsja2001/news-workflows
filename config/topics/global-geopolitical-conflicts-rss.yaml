id: global-geopolitical-conflicts-rss
title: 全球地缘冲突速报（RSS版）

# ============================================================
# RSS-first 配置：放弃 Playwright 网页爬取，改用 RSS 订阅
#
# 优势：
#   - 速度：全部源并行抓取，30~60 秒完成（原 web 方案需 10~50 分钟）
#   - 稳定：RSS 是媒体主动提供的接口，无反爬问题
#   - 成本：LLM token 消耗降至 1/20（只用于最终汇总，不用于提取）
#
# 使用说明：
#   - ✅ 已验证：经过实际测试，可直接使用
#   - ⚠️ 待验证：基于文档整理，首次使用前建议手动测试
#   - fetchFullContent: true：回抓文章全文（用 Readability 解析，非 LLM）
# ============================================================

sources:

  # ============================================================
  # 一、全球通讯社 / 综合国际新闻
  # ============================================================

  - name: Al Jazeera 全球
    type: rss
    url: "https://www.aljazeera.com/xml/rss/all.xml"
    # ✅ 已验证：每次运行 25篇，8秒，极稳定

  - name: BBC 世界新闻 via Google News
    type: rss
    url: "https://news.google.com/rss/search?q=when:2d+site:bbc.com+world&hl=en-US&gl=US&ceid=US:en"
    # 原 BBC RSS (feeds.bbci.co.uk) 在中国大陆 TLS 阻断，改用 Google News 聚合

  - name: The Guardian 世界
    type: rss
    url: "https://www.theguardian.com/world/rss"
    # ✅ 官方，含全文（极少数主流媒体之一），英国视角

  - name: DW 英文 via Google News
    type: rss
    url: "https://news.google.com/rss/search?q=when:2d+site:dw.com&hl=en-US&gl=US&ceid=US:en"
    # 原 DW RSS (rss.dw.com) 在中国大陆 TLS 阻断，改用 Google News 聚合

  - name: France24 国际
    type: rss
    url: "https://www.france24.com/en/rss"
    # 法国国际广播，非洲/中东覆盖强。原 /en/international/rss 返回 404，已更新

  - name: RFI 英文
    type: rss
    url: "https://www.rfi.fr/en/rss"
    # ⚠️ 待验证，法国国际广播，非洲覆盖最强

  - name: NPR 世界新闻
    type: rss
    url: "https://feeds.npr.org/1004/rss.xml"
    # ✅ 官方，美国公共广播

  - name: 联合国新闻
    type: rss
    url: "https://news.un.org/feed/subscribe/en/news/all/rss.xml"
    # 联合国官方，覆盖安理会、制裁、维和。偶有 gzip 解析失败（rss-parser 原生 http 模块不自动解压）
    skipKeywordFilter: true  # 联合国内容本身就是冲突相关，跳过关键词过滤

  - name: Reuters via Google News
    type: rss
    url: "https://news.google.com/rss/search?q=when:2d+site:reuters.com+world+conflict&hl=en-US&gl=US&ceid=US:en"
    # Reuters 官方 RSS 已停止，用 Google News 替代
    # 限定 reuters.com 域名确保来源质量

  - name: AP via Google News
    type: rss
    url: "https://news.google.com/rss/search?q=when:2d+site:apnews.com&hl=en-US&gl=US&ceid=US:en"
    # AP 官方 RSS 已停止，用 Google News 替代

  # ============================================================
  # 二、俄乌 / 欧洲 / 北约
  # ============================================================

  - name: Kyiv Independent via Google News
    type: rss
    url: "https://news.google.com/rss/search?q=when:2d+site:kyivindependent.com&hl=en-US&gl=US&ceid=US:en"
    # 原 RSS feed 返回 404（网站迁至 Next.js/Ghost，feed 端点变更），改用 Google News 聚合

  - name: Meduza 英文 via Google News
    type: rss
    url: "https://news.google.com/rss/search?q=when:2d+site:meduza.io&hl=en-US&gl=US&ceid=US:en"
    # 原 Meduza 英文 RSS (meduza.io/en/rss/all) 返回 404，英文版已下线 RSS，改用 Google News 聚合
    # 注意：Google News 聚合以英文内容为主，但可能混入俄语原始报道

  - name: The Moscow Times
    type: rss
    url: "https://www.themoscowtimes.com/rss/news"
    # ⚠️ 待验证，流亡俄罗斯独立英文媒体

  - name: Radio Free Europe 乌克兰 via Google News
    type: rss
    url: "https://news.google.com/rss/search?q=when:2d+site:rferl.org+Ukraine&hl=en-US&gl=US&ceid=US:en"
    # 原 RFE/RL API 端点 (rferl.org/api/...) 返回 404，API 格式已变更，改用 Google News 聚合
    skipKeywordFilter: true

  - name: Bellingcat
    type: rss
    url: "https://www.bellingcat.com/feed/"
    # ✅ 开源情报调查，东欧/冲突核查，质量极高
    fetchFullContent: true

  - name: 俄乌冲突 Google News 聚合
    type: rss
    url: "https://news.google.com/rss/search?q=Ukraine+Russia+war+ceasefire+when:2d&hl=en-US&gl=US&ceid=US:en"
    # 聚合多来源，覆盖面广但有重复，关键词过滤会去除不相关内容
    skipKeywordFilter: true

  # ============================================================
  # 三、中东 / 北非
  # ============================================================

  - name: Times of Israel
    type: rss
    url: "https://www.timesofisrael.com/feed/"
    # ✅ 已验证，以色列最主要英文媒体

  - name: Middle East Eye via Google News
