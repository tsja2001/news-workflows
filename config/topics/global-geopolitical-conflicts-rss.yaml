  lookbackHours: 48
  maxItems: 60

  runtime:
    concurrency:
      rss: 10        # RSS 抓取轻量，高并发
      web: 2
      default: 5
    sourceTimeoutMs: 30000   # RSS 超时 30 秒，远比 web 快
    retries: 2

dedup:
  enabled: true
  retentionDays: 7

