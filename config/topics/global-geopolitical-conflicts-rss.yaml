# ============================================================
# 编辑层配置 — 控制 LLM 怎么写、写给谁、不写什么
# ============================================================
editorial:
  # 编辑人设。会拼进 SYSTEM_PROMPT 顶部。
  persona: "私人内参编辑，给一位长期关注全球地缘冲突的熟客做日报"

  # 写作语气与风格示范。多行字符串，原样注入到 prompt。
  tone: |
    口语化、有立场、敢下判断。可以说"说白了就是…"、"别看官方说得漂亮，本质是…"、
    "我看这事最关键的不是 A，而是 B"。不装客观，但每个判断都要有素材里的依据，
    不能凭空发挥。避免"或将"、"可能"、"有观察人士认为"这种官话。

  # 读者最关心的方向。LLM 据此排序 keyDevelopments、决定 editorTake 的视角。
  interests:
    - 中东能源与航道（霍尔木兹、苏伊士、马六甲、巴布海峡）
    - 俄乌战场进展与停火谈判
    - 中美俄三方博弈、穿梭外交、阵营再校准
    - 台海与南海军事动向
    - 朝鲜半岛安全与朝俄军技合作
    - 全球制裁、关键矿产、供应链安全

  # 读者明确不关心的话题。LLM 阶段判断，自然语言列表。
  # 命中这些话题的素材：禁止进入 keyDevelopments，可酌情进入 briefs，或直接忽略。
  excludeTopics:
    - 与地缘冲突无关的国内政治丑闻、司法判决、移民案件
    - 名人/娱乐/体育/文艺/播客
    - 与冲突无关的飞行表演、演习意外、交通事故
    - 与地缘冲突无关的医疗、卫生、教育新闻
    - 流亡媒体的人物专访、回忆录式内容

  # fetch 阶段硬过滤。标题/摘要命中任一关键词即丢弃（在 keywords 通过后再过一遍）。
  # 大小写不敏感，适合放高确信度的"绝对不要"。
  excludeKeywords:
    - "U-17"
    - "U-23"
    - football
    - soccer
    - 足球
    - air show
    - 航空展
    - podcast
    - 播客
    - voting rights
    - defamation
    - NHS

  # 低关注度怎么处理：
  #   "brief"  → 合并进 briefs 区（一行短讯，不展开）— 推荐
  #   "drop"   → 直接丢弃，不出现在简报里
  #   "expand" → 仍作为 keyDevelopments 完整展开（等同旧行为）
  lowAttentionHandling: brief

  # 速读区配置
  tldr:
    enabled: true
    maxItems: 5

  # 关键变化数量上限
  keyDevelopmentsLimit:
    high: 5      # 高关注度最多 N 条
    medium: 3    # 中关注度最多 N 条

  # 是否把 context 段合并进 overview（删除冗余的"整体背景"独立段）
  mergeContextIntoOverview: true

# ============================================================
# 多模型融合配置 — DeepSeek 预处理 + Claude 最终成稿
# ============================================================
# mode: single → 单模型直接成稿（向后兼容）
# mode: hybrid → 研究助理(DeepSeek) + 主编(Claude) 两段式
#
# 为什么用 hybrid：
#   - 30+ 源、最多 60 条素材，直接给 Claude 成本高
#   - DeepSeek 便宜适合大批量压缩聚类
#   - Claude 做最终选题判断和 editorTake，质量更高
llmPipeline:
  mode: hybrid

  # 阶段 1：DeepSeek 预处理（研究助理）
  preprocess:
    maxInputItems: 80         # 最多读多少条
    itemExcerptChars: 1000    # 每条摘录长度（字符）
    maxClusters: 12           # 最多产出几组候选主线
    maxFactsPerCluster: 5     # 每组最多几条事实

  # 阶段 2：Claude 最终成稿（主编）
  writer:
    maxSourceItems: 35        # Claude 最多读多少条精简素材
    requireOriginalEvidence: true
    onFailure: fail           # fail=直接报错, fallbackToPreprocessModel=回退单模型

  # 阶段 3：校验（二期，暂不启用）
  validation:
    enabled: false
